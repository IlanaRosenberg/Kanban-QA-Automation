<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanban QA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark" data-testid="navbar">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/" data-testid="nav-home">📋 KanbanQA</a>
      <div class="navbar-nav ms-auto d-flex flex-row align-items-center gap-3">
        <a class="nav-link text-light" href="/boards" data-testid="nav-boards" id="nav-boards-link">My Boards</a>
        <span class="nav-link text-light d-none" data-testid="nav-username" id="nav-username"></span>
        <a class="nav-link text-light" href="/login" data-testid="nav-login" id="nav-login-link">Login</a>
        <a class="nav-link text-light d-none" href="/logout" data-testid="link-logout" id="nav-logout-link">Logout</a>
      </div>
    </div>
  </nav>

  <main class="container mt-4 flex-grow-1" data-testid="main-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="bg-dark text-light text-center py-3 mt-auto" data-testid="footer">
    <small>KanbanQA &copy; 2026 — QA Automation Portfolio Project</small>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/auth.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
