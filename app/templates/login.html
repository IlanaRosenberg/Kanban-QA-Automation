{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center" data-testid="page-login">
  <div class="col-md-5">
    <div class="card shadow-sm mt-4">
      <div class="card-body p-4">
        <h2 class="card-title mb-4 text-center">Login</h2>
        <div class="alert alert-danger d-none" data-testid="login-error" id="login-error"></div>
        <form id="login-form" data-testid="login-form" novalidate>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" data-testid="input-email" id="input-email" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" data-testid="input-password" id="input-password" required />
          </div>
          <button type="submit" class="btn btn-primary w-100" data-testid="btn-login">Login</button>
        </form>
        <p class="mt-3 text-center">
          Don't have an account?
          <a href="/register" data-testid="link-register">Register here</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('input-email').value;
  const password = document.getElementById('input-password').value;
  const errEl = document.getElementById('login-error');
  errEl.classList.add('d-none');
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email, password}),
    });
    const data = await res.json();
    if (res.ok && data.success) {
      localStorage.setItem('kanban_token', data.data.token);
      localStorage.setItem('kanban_user', JSON.stringify({
        id: data.data.user_id, username: data.data.username, role: data.data.role
      }));
      window.location.href = '/boards';
    } else {
      errEl.textContent = data.error || 'Login failed';
      errEl.classList.remove('d-none');
    }
  } catch {
    errEl.textContent = 'Network error';
    errEl.classList.remove('d-none');
  }
});
</script>
{% endblock %}
