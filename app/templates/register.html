{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center" data-testid="page-register">
  <div class="col-md-5">
    <div class="card shadow-sm mt-4">
      <div class="card-body p-4">
        <h2 class="card-title mb-4 text-center">Register</h2>
        <div class="alert alert-danger d-none" data-testid="register-error" id="register-error"></div>
        <div class="alert alert-success d-none" data-testid="register-success" id="register-success"></div>
        <form id="register-form" data-testid="register-form" novalidate>
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" data-testid="input-username" id="input-username" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" data-testid="input-email" id="input-email" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" data-testid="input-password" id="input-password" required />
          </div>
          <button type="submit" class="btn btn-primary w-100" data-testid="btn-register">Register</button>
        </form>
        <p class="mt-3 text-center">
          Already have an account?
          <a href="/login" data-testid="link-login">Login here</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('register-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('input-username').value;
  const email = document.getElementById('input-email').value;
  const password = document.getElementById('input-password').value;
  const errEl = document.getElementById('register-error');
  const okEl = document.getElementById('register-success');
  errEl.classList.add('d-none');
  okEl.classList.add('d-none');
  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username, email, password}),
    });
    const data = await res.json();
    if (res.ok && data.success) {
      okEl.textContent = 'Account created! Redirecting to login...';
      okEl.classList.remove('d-none');
      setTimeout(() => window.location.href = '/login', 1200);
    } else {
      errEl.textContent = data.error || 'Registration failed';
      errEl.classList.remove('d-none');
    }
  } catch {
    errEl.textContent = 'Network error';
    errEl.classList.remove('d-none');
  }
});
</script>
{% endblock %}
